<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>佳信水产收购单 v4.8 - 修复版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary-blue: #2563eb; --primary-dark: #1e40af; --success: #10b981; --danger: #ef4444; --text-primary: #1e293b; --text-secondary: #64748b; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #f8fafc 100%); min-height: 100vh; color: var(--text-primary); padding-bottom: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px 0; position: relative; }
        .header h1 { font-size: 32px; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary-blue) 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        #syncBadge { position: absolute; top: 0; right: 0; display: flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; opacity: 0.6; cursor: pointer; transition: all 0.3s ease; }
        #syncBadge.online { background: linear-gradient(135deg, #10b981 0%, #059669 100%); opacity: 1; }
        #syncBadge.syncing { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); opacity: 1; }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .stats-overview { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .stat-box { background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-dark) 100%); color: white; padding: 24px 16px; border-radius: 20px; text-align: center; }
        .stat-box:nth-child(2) { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .stat-box:nth-child(3) { background: linear-gradient(135deg, var(--success) 0%, #059669 100%); }
        .stat-box:nth-child(4) { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
        .stat-number { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
        .module-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .module-btn { background: linear-gradient(145deg, #ffffff 0%, #f1f5f9 100%); border: none; border-radius: 20px; padding: 28px 16px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .module-btn:hover { transform: translateY(-4px); }
        .module-icon { font-size: 36px; margin-bottom: 12px; display: block; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .page-header { display: flex; align-items: center; margin-bottom: 24px; }
        .back-btn { background: rgba(255, 255, 255, 0.9); border: none; color: var(--primary-blue); padding: 10px 18px; border-radius: 12px; cursor: pointer; margin-right: 16px; font-size: 14px; font-weight: 600; }
        .handwritten-form { background: white; border: 2px solid #334155; border-radius: 12px; padding: 20px; font-family: 'KaiTi', serif; }
        .form-header { text-align: center; border-bottom: 2px solid #334155; padding-bottom: 12px; margin-bottom: 16px; }
        .form-header h2 { font-size: 22px; letter-spacing: 4px; margin-bottom: 6px; font-family: 'SimHei', sans-serif; color: var(--primary-dark); }
        .purchase-table { width: 100%; border-collapse: collapse; margin: 16px 0; border: 2px solid #334155; font-size: 14px; }
        .purchase-table th, .purchase-table td { border: 1px solid #334155; padding: 10px 6px; text-align: center; }
        .purchase-table th { background: #f1f5f9; font-weight: 700; }
        .purchase-table td input { width: 100%; border: none; text-align: center; font-size: 15px; font-family: 'KaiTi', serif; background: transparent; }
        .summary-box { border: 2px solid #334155; padding: 20px; margin-top: 16px; background: #fafafa; border-radius: 12px; }
        .summary-total { font-size: 24px; color: var(--danger); font-weight: 800; }
        .btn-primary { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary-blue) 0%, #3b82f6 100%); color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 24px; }
        .btn-secondary { width: 100%; padding: 16px; background: #f1f5f9; color: var(--text-secondary); border: 2px solid #e2e8f0; border-radius: 16px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .btn-add { background: var(--success); color: white; border: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-add-inline { background: var(--success); color: white; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .payment-status-box { margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 16px; border: 1px solid #e2e8f0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal.show { display: block; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; max-width: 500px; margin: 20px auto; }
        .receipt-preview { background: #ffffff; padding: 20px; border: 2px solid #3b82f6; font-family: 'PingFang SC', sans-serif; border-radius: 12px; }
        .list-item { background: white; border-radius: 16px; padding: 20px; margin-bottom: 12px; cursor: pointer; border-left: 4px solid var(--primary-blue); }
        .search-box { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 15px; margin-bottom: 16px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 10px 18px; border: 2px solid #e2e8f0; background: white; border-radius: 24px; font-size: 13px; cursor: pointer; font-weight: 600; color: var(--text-secondary); }
        .filter-btn.active { background: linear-gradient(135deg, var(--primary-blue) 0%, #3b82f6 100%); color: white; border-color: transparent; }
        .tab-bar { display: flex; background: #f1f5f9; border-radius: 16px; padding: 4px; margin-bottom: 24px; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: 600; color: var(--text-secondary); }
        .tab-btn.active { background: white; color: var(--primary-blue); font-weight: 700; }
        .order-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border-left: 4px solid var(--primary-blue); }
        .detail-header { background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-dark) 100%); color: white; padding: 28px 24px; border-radius: 24px; margin-bottom: 24px; }
        .summary-card { background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-dark) 100%); color: white; padding: 24px; border-radius: 24px; margin-bottom: 24px; }
        .entity-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 1500; justify-content: center; align-items: center; padding: 20px; }
        .entity-modal.show { display: flex; }
        .entity-modal-content { background: white; border-radius: 24px; padding: 28px; width: 100%; max-width: 400px; }
        .form-input { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 15px; }
        .loading { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); color: white; padding: 40px 48px; border-radius: 24px; z-index: 2000; }
        .loading.show { display: block; }
        @media (max-width: 480px) { .container { padding: 16px; } .header h1 { font-size: 26px; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="homePage" class="page active">
            <div class="header">
                <div id="syncBadge" onclick="manualSync()">
                    <span id="syncIndicator" style="width: 8px; height: 8px; background: #fff; border-radius: 50%;"></span>
                    <span id="syncText">本地模式</span>
                </div>
                <h1>📦 佳信水产</h1>
                <p>智能订单管理系统</p>
            </div>
            <div class="card">
                <div class="stats-overview">
                    <div class="stat-box"><div class="stat-number" id="totalOwedToUs">¥0</div><div class="stat-label">客户欠我</div></div>
                    <div class="stat-box"><div class="stat-number" id="totalWeOwe">¥0</div><div class="stat-label">欠供应商</div></div>
                    <div class="stat-box"><div class="stat-number" id="todayOrders">0</div><div class="stat-label">今日订单</div></div>
                    <div class="stat-box"><div class="stat-number" id="monthAmount">¥0</div><div class="stat-label">本月采购</div></div>
                </div>
            </div>
            <div class="card">
                <div class="module-grid">
                    <div class="module-btn" onclick="goToPurchase()"><div class="module-icon">📝</div><div class="module-label">原料收购</div></div>
                    <div class="module-btn" onclick="goToSalesList()"><div class="module-icon">📄</div><div class="module-label">销售清单</div></div>
                    <div class="module-btn" onclick="goToSuppliers()"><div class="module-icon">🏢</div><div class="module-label">供应商款项</div></div>
                    <div class="module-btn" onclick="goToCustomers()"><div class="module-icon">👥</div><div class="module-label">客户款项</div></div>
                    <div class="module-btn" onclick="goToHistoryOrders()"><div class="module-icon">📋</div><div class="module-label">历史订单</div></div>
                    <div class="module-btn" onclick="goToStatistics()"><div class="module-icon">📊</div><div class="module-label">数据统计</div></div>
                    <div class="module-btn" onclick="showCloudInfo()"><div class="module-icon">☁️</div><div class="module-label">云端状态</div></div>
                    <div class="module-btn" onclick="exportAllData()"><div class="module-icon">💾</div><div class="module-label">数据备份</div></div>
                </div>
            </div>
        </div>

        <div id="purchasePage" class="page">
            <div class="page-header"><button class="back-btn" onclick="goHome()">← 返回</button><span class="page-title">原料收购</span></div>
            <div class="handwritten-form">
                <div class="form-header"><h2>佳信水产销售清单</h2><h3>收 购 单</h3></div>
                <div style="display: flex; justify-content: space-between; margin: 12px 0;"><span>日期: <input type="date" id="purchaseDate" style="border: none; border-bottom: 2px solid #cbd5e1; font-family: 'KaiTi';"></span><span>编号: <input type="text" id="purchaseDocNo" value="001" style="border: none; border-bottom: 2px solid #cbd5e1; width: 60px; text-align: center; font-family: 'KaiTi';"></span></div>
                <div style="display: flex; justify-content: space-between; margin: 12px 0; align-items: center;"><span>品名: <input type="text" id="purchaseProduct" value="黑虎虾" style="border: none; border-bottom: 2px solid #cbd5e1; width: 100px; font-family: 'KaiTi';"></span><span>供应商: <select id="purchaseSupplier" style="border: none; border-bottom: 2px solid #cbd5e1; font-family: 'KaiTi'; min-width: 120px;"></select><button class="btn-add-inline" onclick="quickAddSupplier()">+</button></span></div>
                <table class="purchase-table"><thead><tr><th>序号</th><th>数量（箱×斤）</th><th>数量（箱×斤）</th><th>数量（箱×斤）</th></tr></thead><tbody id="purchaseTableBody"></tbody></table>
                <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0;"><span style="font-size: 12px; color: #666;">格式: 15×18</span><button class="btn-add" onclick="addPurchaseRow()">+ 添加行</button></div>
                <div class="summary-box"><div style="display: flex; justify-content: space-between; margin: 10px 0;"><span style="font-weight: bold;">合计：<span id="purchaseTotalJin" style="font-size: 20px; color: #d00;">0</span> 斤</span><span>单价<input type="number" id="purchasePrice" value="22.50" step="0.01" style="border: none; border-bottom: 1px solid #333; width: 60px; text-align: center; color: #d00;" onchange="calculatePurchaseTotal()"></span></div><div style="display: flex; justify-content: space-between; border-top: 1px dashed #999; padding-top: 10px; margin-top: 10px;"><span style="font-size: 16px;">合计金额</span><span id="purchaseTotalAmount" class="summary-total">¥0.00</span></div></div>
                <div class="payment-status-box"><div style="font-weight: bold; margin-bottom: 10px;">付款状态</div><select id="purchasePaymentStatus" style="width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; margin-bottom: 12px;" onchange="updatePurchasePayment()"><option value="unpaid">未付款</option><option value="paid">已付款</option><option value="partial">部分付款</option></select><div id="purchasePaymentInputs" style="display: none; grid-template-columns: 1fr 1fr; gap: 12px;"><input type="number" id="purchasePaidAmount" placeholder="已付金额" oninput="calculatePurchaseRemaining()"><input type="number" id="purchaseRemainingAmount" placeholder="剩余欠款" readonly style="background: #f5f5f5;"></div></div>
            </div>
            <button class="btn-primary" onclick="savePurchaseOrder()">生成收购单</button>
            <button class="btn-secondary" onclick="goHome()">返回首页</button>
        </div>

        <div id="suppliersPage" class="page">
            <div class="page-header"><button class="back-btn" onclick="goHome()">← 返回</button><span class="page-title">供应商款项</span></div>
            <div class="card"><input type="text" class="search-box" placeholder="搜索供应商..." oninput="searchSuppliers(this.value)"><div class="filter-bar"><button class="filter-btn active" onclick="filterSuppliers('all', this)">全部</button><button class="filter-btn" onclick="filterSuppliers('owe', this)">有欠款</button><button class="filter-btn" onclick="filterSuppliers('clear', this)">已结清</button></div><div id="suppliersList"></div></div>
            <button class="btn-primary" onclick="openSupplierModal()">+ 添加供应商</button>
        </div>

        <div id="customersPage" class="page">
            <div class="page-header"><button class="back-btn" onclick="goHome()">← 返回</button><span class="page-title">客户款项</span></div>
            <div class="card"><input type="text" class="search-box" placeholder="搜索客户..." oninput="searchCustomers(this.value)"><div class="filter-bar"><button class="filter-btn active" onclick="filterCustomers('all', this)">全部</button><button class="filter-btn" onclick="filterCustomers('owe', this)">有欠款</button><button class="filter-btn" onclick="filterCustomers('clear', this)">已结清</button></div><div id="customersList"></div></div>
            <button class="btn-primary" onclick="openCustomerModal()">+ 添加客户</button>
        </div>

        <div id="historyOrdersPage" class="page">
            <div class="page-header"><button class="back-btn" onclick="goHome()">← 返回</button><span class="page-title">历史订单</span></div>
            <div class="summary-card"><div style="font-size: 14px; opacity: 0.9; margin-bottom: 10px;">全部订单汇总</div><div style="font-size: 36px; font-weight: 800;" id="historyTotalAmount">¥0.00</div><div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px;"><div style="background: rgba(255,255,255,0.15); padding: 16px; border-radius: 16px; text-align: center;"><div style="font-size: 18px; font-weight: 800;" id="historyTotalOrders">0</div><div style="font-size: 11px; opacity: 0.9;">订单总数</div></div><div style="background: rgba(255,255,255,0.15); padding: 16px; border-radius: 16px; text-align: center;"><div style="font-size: 18px; font-weight: 800;" id="historyPaidAmount">¥0</div><div style="font-size: 11px; opacity: 0.9;">已付金额</div></div><div style="background: rgba(255,255,255,0.15); padding: 16px; border-radius: 16px; text-align: center;"><div style="font-size: 18px; font-weight: 800;" id="historyUnpaidAmount">¥0</div><div style="font-size: 11px; opacity: 0.9;">待付金额</div></div></div></div>
            <div class="card"><div class="tab-bar"><button class="tab-btn active" onclick="switchHistoryTab('purchase', this)">采购订单</button><button class="tab-btn" onclick="switchHistoryTab('sales', this)">销售订单</button></div><div class="date-filter"><input type="date" id="historyStartDate" onchange="filterHistoryOrders()"><input type="date" id="historyEndDate" onchange="filterHistoryOrders()"></div><div id="historyOrdersList"></div></div>
        </div>
    </div>

    <div class="modal" id="purchaseReceiptModal"><div class="modal-content"><div style="display: flex; gap: 12px; margin-bottom: 24px;"><button class="btn-primary" onclick="downloadPurchaseReceipt()" style="flex: 1; margin-top: 0;">📥 保存图片</button><button class="btn-secondary" onclick="closePurchaseReceipt()" style="flex: 1; margin-top: 0;">关闭</button></div><div id="purchaseReceipt" class="receipt-preview"></div></div></div>

    <div class="entity-modal" id="entityModal"><div class="entity-modal-content"><div style="font-size: 20px; font-weight: 700; margin-bottom: 24px;" id="entityModalTitle">添加</div><input type="text" class="form-input" id="entityName" placeholder="名称" style="margin-bottom: 12px;"><input type="text" class="form-input" id="entityPhone" placeholder="电话" style="margin-bottom: 12px;"><input type="text" class="form-input" id="entityRemark" placeholder="备注" style="margin-bottom: 24px;"><div style="display: flex; gap: 12px;"><button class="btn-secondary" onclick="closeEntityModal()" style="flex: 1; margin-top: 0;">取消</button><button class="btn-primary" onclick="saveEntity()" style="flex: 1; margin-top: 0;">保存</button></div></div></div>

    <div class="loading" id="loading"><div style="width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div><div>处理中...</div></div>

    <script>
        // 修复版：移除有问题的代理配置
        let suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        let customers = JSON.parse(localStorage.getItem('customers') || '[]');
        let purchaseOrders = JSON.parse(localStorage.getItem('purchaseOrders') || '[]');
        let salesOrders = JSON.parse(localStorage.getItem('salesOrders') || '[]');

        const JSONBIN_CONFIG = {
            MASTER_KEY: '$2a$10$42R1HUnhc8El3s8IEf4sO.j6KnDq9wF/7gkHB1trcltILhKXafovu',
            BASE_URL: 'https://api.jsonbin.io/v3',
            BIN_ID: localStorage.getItem('jsonbin_id') || null
            // 修复：删除了 USE_PROXY 和 PROXY_URL
        };

        
        let isSyncing = false, currentEntityType = '', purchaseRowCount = 0;
        let supplierFilter = 'all', customerFilter = 'all', historyTab = 'purchase';  // 添加缺失的变量

        // 修复：静默错误，不显示烦人的提示
        function showSyncStatus(msg, type) {
            const badge = document.getElementById('syncBadge'), text = document.getElementById('syncText');
            if (!badge || !text) return;

            // 重置样式
            badge.classList.remove('online', 'syncing');

            if (type === 'error') {
                console.log('[同步错误]', msg);
                badge.style.background = 'linear-gradient(135deg, #6b7280 0%, #4b5563 100%)';
                badge.style.opacity = '0.6';
                text.textContent = '本地模式';
                return;
            }

            text.textContent = msg;
            badge.style.opacity = '1';

            if (type === 'success') {
                badge.classList.add('online');
                badge.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                setTimeout(() => { badge.style.opacity = '0.8'; }, 2000);
            } else if (type === 'syncing') {
                badge.classList.add('syncing');
                badge.style.background = 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)';
            } else {
                badge.style.background = 'linear-gradient(135deg, #6b7280 0%, #4b5563 100%)';
            }
        }

        function checkEnv() {
            // 检查网络状态
            if (!navigator.onLine) {
                console.log('[云端] 设备离线');
                return { can: false, reason: 'offline' };
            }
            // 检查 Bin ID
            const binId = localStorage.getItem('jsonbin_id');
            if (!binId) {
                console.log('[云端] 未配置 Bin ID');
                return { can: false, reason: 'no_bin' };
            }
            // 更新配置
            JSONBIN_CONFIG.BIN_ID = binId;
            return { can: true };
        }

        // 修复：直接请求，不使用代理
        async function makeRequest(url, opts = {}) {
            try {
                const response = await fetch(url, { 
                    ...opts, 
                    headers: { 
                        ...opts.headers, 
                        'Content-Type': 'application/json', 
                        'X-Master-Key': JSONBIN_CONFIG.MASTER_KEY 
                    } 
                });
                return response;
            } catch (error) {
                console.error('[请求失败]', error);
                throw error;
            }
        }

        async function loadFromCloud() {
            const env = checkEnv();
            if (!env.can) { 
                console.log('[云端] 无法同步:', env.reason);
                showSyncStatus('本地模式', 'info'); 
                return false; 
            }

            if (isSyncing) return false; 
            isSyncing = true; 
            showSyncStatus('同步中...', 'syncing');

            try {
                console.log('[云端] 开始同步，Bin ID:', JSONBIN_CONFIG.BIN_ID);

                const res = await makeRequest(`${JSONBIN_CONFIG.BASE_URL}/b/${JSONBIN_CONFIG.BIN_ID}/latest`);

                if (!res.ok) {
                    if (res.status === 404) {
                        console.log('[云端] Bin 不存在，创建新 Bin');
                        return await createBin();
                    }
                    throw new Error('HTTP ' + res.status);
                }

                const result = await res.json();
                const data = result.record;

                console.log('[云端] 获取数据成功:', Object.keys(data));

                // 合并数据（云端优先）
                if (data.suppliers) suppliers = data.suppliers; 
                if (data.customers) customers = data.customers;
                if (data.purchaseOrders) purchaseOrders = data.purchaseOrders; 
                if (data.salesOrders) salesOrders = data.salesOrders;

                saveAllData(); 
                showSyncStatus('已同步', 'success'); 
                updateHomeStats(); 
                console.log('[云端] 同步完成 ✓');
                return true;
            } catch (e) { 
                console.error('[云端] 同步失败:', e);
                showSyncStatus('同步失败', 'error'); 
                return false; 
            } finally { 
                isSyncing = false; 
            }
        }

        async function createBin() {
            try {
                console.log('[云端] 创建新 Bin...');
                const data = { 
                    suppliers, 
                    customers, 
                    purchaseOrders, 
                    salesOrders, 
                    lastSync: new Date().toISOString(),
                    version: '4.8'
                };

                const res = await makeRequest(`${JSONBIN_CONFIG.BASE_URL}/b`, { 
                    method: 'POST', 
                    body: JSON.stringify(data) 
                });

                if (!res.ok) throw new Error('创建失败: ' + res.status);

                const result = await res.json(); 
                JSONBIN_CONFIG.BIN_ID = result.metadata.id;
                localStorage.setItem('jsonbin_id', result.metadata.id);

                console.log('[云端] Bin 创建成功:', result.metadata.id);
                showSyncStatus('云端已连接', 'success'); 
                return true;
            } catch (e) { 
                console.error('[云端] 创建失败:', e);
                showSyncStatus('连接失败', 'error'); 
                return false; 
            }
        }

        async function manualSync() {
            const env = checkEnv();

            if (!env.can) {
                if (env.reason === 'offline') {
                    alert('设备处于离线状态，请检查网络连接后重试。');
                    return;
                }

                if (env.reason === 'no_bin') {
                    if (confirm('云端同步尚未配置。是否立即创建云端存储？\n\n这将把当前数据备份到云端，之后可以在其他设备上访问。')) {
                        await createBin();
                    }
                    return;
                }
            }

            await loadFromCloud();
        }

        function saveAllData() {
            localStorage.setItem('suppliers', JSON.stringify(suppliers)); 
            localStorage.setItem('customers', JSON.stringify(customers));
            localStorage.setItem('purchaseOrders', JSON.stringify(purchaseOrders)); 
            localStorage.setItem('salesOrders', JSON.stringify(salesOrders));

            // 自动同步到云端（如果已配置）
            const env = checkEnv();
            if (env.can && !isSyncing) {
                console.log('[云端] 数据变更，自动同步中...');
                syncToCloud();
            }
        }

        // 新增：主动同步到云端
        async function syncToCloud() {
            if (isSyncing) return;
            isSyncing = true;

            try {
                const data = { 
                    suppliers, 
                    customers, 
                    purchaseOrders, 
                    salesOrders, 
                    lastSync: new Date().toISOString(),
                    version: '4.8'
                };

                const res = await makeRequest(`${JSONBIN_CONFIG.BASE_URL}/b/${JSONBIN_CONFIG.BIN_ID}`, { 
                    method: 'PUT', 
                    body: JSON.stringify(data) 
                });

                if (res.ok) {
                    console.log('[云端] 同步成功 ✓');
                    showSyncStatus('已同步', 'success');
                } else {
                    throw new Error('同步失败: ' + res.status);
                }
            } catch (e) {
                console.error('[云端] 同步失败:', e);
                showSyncStatus('同步失败', 'error');
            } finally {
                isSyncing = false;
            }
        }

        function showCloudInfo() {
            alert(`云端状态: ${checkEnv().can ? '已连接' : '未配置'}\nBin ID: ${JSONBIN_CONFIG.BIN_ID || '未创建'}\n数据: 供应商${suppliers.length}个, 客户${customers.length}个, 采购订单${purchaseOrders.length}笔, 销售订单${salesOrders.length}笔`);
        }

        function exportAllData() {
            const data = { suppliers, customers, purchaseOrders, salesOrders, exportTime: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = '佳信水产备份_' + new Date().toLocaleDateString() + '.json'; a.click(); URL.revokeObjectURL(url);
            alert('✓ 数据已导出');
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('[系统] 佳信水产收购单 v4.8 启动中...');

            const today = new Date().toISOString().split('T')[0];
            const pd = document.getElementById('purchaseDate'); 
            if (pd) pd.value = today;

            initPurchaseTable(); 
            updateHomeStats();

            // 检查云端状态
            const env = checkEnv();
            console.log('[系统] 云端状态:', env.can ? '可用' : '不可用 (' + env.reason + ')');

            if (env.can) {
                setTimeout(() => {
                    console.log('[系统] 自动同步启动');
                    loadFromCloud();
                }, 1000);
            } else {
                showSyncStatus('本地模式', 'info');
            }
        });

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0, 0); }
        function goHome() { showPage('homePage'); updateHomeStats(); }
        
        function goToSalesList() { 
            alert('销售清单功能开发中...\n\n请使用"原料收购"模块创建采购订单，使用"历史订单"查看所有订单记录。'); 
        }
        function goToStatistics() { 
            showPage('historyOrdersPage'); 
            document.getElementById('historyStartDate').value = new Date().toISOString().slice(0, 8) + '01'; 
            document.getElementById('historyEndDate').value = new Date().toISOString().split('T')[0]; 
            filterHistoryOrders(); 
        }
        function quickAddSupplier() { openSupplierModal(); }

        function goToPurchase() { showPage('purchasePage'); loadSupplierSelect(); }
        function goToSuppliers() { showPage('suppliersPage'); renderSuppliersList(); }
        function goToCustomers() { showPage('customersPage'); renderCustomersList(); }
        function goToHistoryOrders() { showPage('historyOrdersPage'); document.getElementById('historyStartDate').value = new Date().toISOString().slice(0, 8) + '01'; document.getElementById('historyEndDate').value = new Date().toISOString().split('T')[0]; filterHistoryOrders(); }

        function updateHomeStats() {
            let owedToUs = 0, weOwe = 0;
            salesOrders.forEach(o => { if (o.paymentStatus === 'unpaid') owedToUs += o.totalAmount; else if (o.paymentStatus === 'partial') owedToUs += o.remainingAmount; });
            purchaseOrders.forEach(o => { if (o.paymentStatus === 'unpaid') weOwe += o.totalAmount; else if (o.paymentStatus === 'partial') weOwe += o.remainingAmount; });
            const todayStr = new Date().toISOString().split('T')[0];
            const todayOrders = purchaseOrders.filter(o => o.date === todayStr).length + salesOrders.filter(o => o.date === todayStr).length;
            const monthPurchase = purchaseOrders.filter(o => o.date.startsWith(todayStr.substring(0, 7))).reduce((s, o) => s + o.totalAmount, 0);
            document.getElementById('totalOwedToUs').textContent = '¥' + owedToUs.toFixed(0);
            document.getElementById('totalWeOwe').textContent = '¥' + weOwe.toFixed(0);
            document.getElementById('todayOrders').textContent = todayOrders;
            document.getElementById('monthAmount').textContent = '¥' + monthPurchase.toFixed(0);
        }

        function initPurchaseTable() { const tb = document.getElementById('purchaseTableBody'); tb.innerHTML = ''; purchaseRowCount = 0; for (let i = 0; i < 8; i++) addPurchaseRow(); document.getElementById('purchaseDocNo').value = String(purchaseOrders.length + 1).padStart(3, '0'); }
        function addPurchaseRow() { purchaseRowCount++; const tr = document.createElement('tr'); tr.innerHTML = `<td style="background: #f8fafc; font-weight: 700; color: #64748b;">${purchaseRowCount}</td><td><input type="text" placeholder="箱×斤" onchange="calculatePurchase()" style="width: 100%; border: none; text-align: center; font-family: 'KaiTi';"></td><td><input type="text" placeholder="箱×斤" onchange="calculatePurchase()" style="width: 100%; border: none; text-align: center; font-family: 'KaiTi';"></td><td><input type="text" placeholder="箱×斤" onchange="calculatePurchase()" style="width: 100%; border: none; text-align: center; font-family: 'KaiTi';"></td>`; document.getElementById('purchaseTableBody').appendChild(tr); }
        function parseSpec(str) { if (!str) return null; const m = str.trim().match(/^(\d+)\s*[×\*xX]\s*(\d+)$/); if (m) return { box: parseInt(m[1]), perBox: parseInt(m[2]), total: parseInt(m[1]) * parseInt(m[2]) }; return null; }
        function calculatePurchase() { let total = 0, c1 = 0, c2 = 0, c3 = 0; document.querySelectorAll('#purchaseTableBody tr').forEach((tr, idx) => { tr.querySelectorAll('input').forEach((inp, col) => { const spec = parseSpec(inp.value); if (spec) { total += spec.total; if (col === 0) c1 += spec.total; else if (col === 1) c2 += spec.total; else if (col === 2) c3 += spec.total; } }); }); document.getElementById('purchaseTotalJin').textContent = total; document.getElementById('purchaseTotalJin2').textContent = total; document.getElementById('col1Total').textContent = c1 + '斤'; document.getElementById('col2Total').textContent = c2 + '斤'; document.getElementById('col3Total').textContent = c3 + '斤'; calculatePurchaseTotal(); }
        function calculatePurchaseTotal() { const jin = parseInt(document.getElementById('purchaseTotalJin').textContent) || 0; const price = parseFloat(document.getElementById('purchasePrice').value) || 0; document.getElementById('purchaseTotalAmount').textContent = '¥' + (jin * price).toFixed(2); }
        function updatePurchasePayment() { document.getElementById('purchasePaymentInputs').style.display = document.getElementById('purchasePaymentStatus').value === 'partial' ? 'grid' : 'none'; }
        function calculatePurchaseRemaining() { const total = parseFloat(document.getElementById('purchaseTotalAmount').textContent.replace('¥', '')) || 0; const paid = parseFloat(document.getElementById('purchasePaidAmount').value) || 0; document.getElementById('purchaseRemainingAmount').value = (total - paid).toFixed(2); }

        function savePurchaseOrder() {
            const supplierId = document.getElementById('purchaseSupplier').value;
            if (!supplierId) { alert('请选择供应商'); return; }
            const supplier = suppliers.find(s => s.id === parseInt(supplierId));
            const items = []; let itemNo = 1;
            document.querySelectorAll('#purchaseTableBody tr').forEach((tr, rowIdx) => { tr.querySelectorAll('input').forEach((inp, colIdx) => { const spec = parseSpec(inp.value); if (spec) items.push({ no: itemNo++, row: rowIdx + 1, col: colIdx + 1, box: spec.box, perBox: spec.perBox, total: spec.total }); }); });
            if (!items.length) { alert('请填写产品'); return; }
            const totalWeight = items.reduce((s, i) => s + i.total, 0); const price = parseFloat(document.getElementById('purchasePrice').value) || 0; const totalAmount = totalWeight * price;
            const status = document.getElementById('purchasePaymentStatus').value; const paid = status === 'paid' ? totalAmount : (status === 'partial' ? (parseFloat(document.getElementById('purchasePaidAmount').value) || 0) : 0);
            const order = { id: Date.now(), docNumber: document.getElementById('purchaseDocNo').value, date: document.getElementById('purchaseDate').value, supplierId: parseInt(supplierId), supplierName: supplier.name, product: document.getElementById('purchaseProduct').value || '黑虎虾', items, totalWeight, totalAmount, price, paymentStatus: status, paidAmount: paid, remainingAmount: totalAmount - paid };
            purchaseOrders.unshift(order); saveAllData(); showPurchaseReceipt(order); initPurchaseTable(); updateHomeStats();
        }

        function showPurchaseReceipt(order) {
            let html = `<div style="background: #ffffff; padding: 20px; border: 2px solid #3b82f6; font-family: 'PingFang SC', sans-serif; border-radius: 12px;"><div style="text-align: center; padding: 20px; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border-bottom: 3px solid #3b82f6; margin: 0 10px; border-radius: 8px 8px 0 0;"><h2 style="font-size: 20px; letter-spacing: 2px; margin-bottom: 10px; font-family: 'SimHei'; color: #1e3a5f; font-weight: 800;">佳信水产销售清单</h2><h3 style="font-size: 18px; letter-spacing: 6px; font-family: 'SimHei';">收 购 单</h3></div>`;
            html += `<div style="margin: 20px 10px; font-size: 14px; line-height: 2;"><div style="display: flex; justify-content: space-between;"><span>日期：${order.date}</span><span>编号：${order.docNumber}</span></div><div style="display: flex; justify-content: space-between;"><span>品名：${order.product}</span><span>供应商：${order.supplierName}</span></div></div>`;
            const rowData = {}; for (let i = 1; i <= 8; i++) rowData[i] = ['', '', '']; order.items.forEach(i => { if (rowData[i.row]) rowData[i.row][i.col - 1] = i.box + '×' + i.perBox; });
            let c1 = 0, c2 = 0, c3 = 0; order.items.forEach(i => { if (i.col === 1) c1 += i.total; if (i.col === 2) c2 += i.total; if (i.col === 3) c3 += i.total; });
            html += `<table style="width: calc(100% - 20px); border-collapse: collapse; margin: 16px 10px; border: 1px solid #334155;"><thead><tr style="background: #f1f5f9;"><th style="border: 1px solid #334155; padding: 10px;">序号</th><th style="border: 1px solid #334155; padding: 10px;">数量（箱×斤）</th><th style="border: 1px solid #334155; padding: 10px;">数量（箱×斤）</th><th style="border: 1px solid #334155; padding: 10px;">数量（箱×斤）</th></tr></thead><tbody>`;
            for (let i = 1; i <= 8; i++) html += `<tr><td style="border: 1px solid #334155; padding: 10px; text-align: center; background: #f9f9f9; font-weight: bold;">${i}</td><td style="border: 1px solid #334155; padding: 10px; text-align: center;">${rowData[i][0]}</td><td style="border: 1px solid #334155; padding: 10px; text-align: center;">${rowData[i][1]}</td><td style="border: 1px solid #334155; padding: 10px; text-align: center;">${rowData[i][2]}</td></tr>`;
            html += `</tbody><tfoot><tr style="font-weight: bold;"><td style="border: 1px solid #334155; padding: 10px; text-align: center;">合计</td><td style="border: 1px solid #334155; padding: 10px; text-align: center;">${c1}斤</td><td style="border: 1px solid #334155; padding: 10px; text-align: center;">${c2}斤</td><td style="border: 1px solid #334155; padding: 10px; text-align: center;">${c3}斤</td></tr></tfoot></table>`;
            html += `<div style="margin: 20px 10px; padding: 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px;"><div style="display: flex; justify-content: space-between; margin: 10px 0;"><span>总重量：${order.totalWeight} 斤</span><span>单价：${order.price.toFixed(2)} 元/斤</span></div><div style="display: flex; justify-content: space-between; border-top: 1px dashed #999; padding-top: 10px; margin-top: 10px;"><span style="font-size: 16px; font-weight: bold;">合计金额</span><span style="font-size: 24px; color: #d00; font-weight: 800;">¥${order.totalAmount.toFixed(2)}</span></div></div>`;
            html += `<div style="margin: 20px 10px; display: flex; justify-content: space-between; font-size: 14px; color: #64748b;"><span>📞 电话：18077761212</span><span>✍️ 采购方：郑佳宝</span></div></div>`;
            document.getElementById('purchaseReceipt').innerHTML = html; document.getElementById('purchaseReceiptModal').classList.add('show');
        }

        function closePurchaseReceipt() { document.getElementById('purchaseReceiptModal').classList.remove('show'); }
        function downloadPurchaseReceipt() { document.getElementById('loading').classList.add('show'); html2canvas(document.getElementById('purchaseReceipt'), { scale: 2, backgroundColor: '#ffffff' }).then(canvas => { const link = document.createElement('a'); link.download = '收购单_' + new Date().toLocaleDateString() + '.png'; link.href = canvas.toDataURL(); link.click(); document.getElementById('loading').classList.remove('show'); }); }

        function loadSupplierSelect() { const sel = document.getElementById('purchaseSupplier'); sel.innerHTML = '<option value="">请选择</option>'; suppliers.forEach(s => { const opt = document.createElement('option'); opt.value = s.id; opt.textContent = s.name; sel.appendChild(opt); }); }

        function renderSuppliersList() { const container = document.getElementById('suppliersList'); if (!suppliers.length) { container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">暂无供应商</div>'; return; } container.innerHTML = suppliers.map(s => { const stats = calcSupplierStats(s.id); const hasOwe = stats.owe > 0; return `<div class="list-item" onclick="alert('供应商: ${s.name}\n总采购: ¥${stats.total.toFixed(2)}\n欠款: ¥${stats.owe.toFixed(2)}\n订单数: ${stats.orders}笔')"><div style="display: flex; justify-content: space-between; margin-bottom: 10px;"><span style="font-weight: 700; font-size: 16px;">${s.name} ${hasOwe ? '<span style="background: #fef2f2; color: #ef4444; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-left: 8px;">欠¥' + stats.owe.toFixed(0) + '</span>' : '<span style="background: #f0fdf4; color: #10b981; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-left: 8px;">结清</span>'}</span><span style="font-size: 18px; font-weight: 800; color: ${hasOwe ? '#ef4444' : '#10b981'};">¥${stats.total.toFixed(0)}</span></div><div style="display: flex; justify-content: space-between; font-size: 13px; color: #64748b;"><span>电话：${s.phone || '无'}</span><span>订单：${stats.orders}笔</span></div></div>`; }).join(''); }

        function calcSupplierStats(id) { const orders = purchaseOrders.filter(o => o.supplierId === id); let total = 0, owe = 0; orders.forEach(o => { total += o.totalAmount; if (o.paymentStatus === 'unpaid') owe += o.totalAmount; else if (o.paymentStatus === 'partial') owe += o.remainingAmount; }); return { total, owe, orders: orders.length }; }

        function renderCustomersList() { const container = document.getElementById('customersList'); if (!customers.length) { container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">暂无客户</div>'; return; } container.innerHTML = customers.map(c => { const stats = calcCustomerStats(c.id); const hasOwe = stats.owe > 0; return `<div class="list-item" onclick="alert('客户: ${c.name}\n总销售: ¥${stats.total.toFixed(2)}\n欠款: ¥${stats.owe.toFixed(2)}\n订单数: ${stats.orders}笔')"><div style="display: flex; justify-content: space-between; margin-bottom: 10px;"><span style="font-weight: 700; font-size: 16px;">${c.name} ${hasOwe ? '<span style="background: #fef2f2; color: #ef4444; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-left: 8px;">欠¥' + stats.owe.toFixed(0) + '</span>' : '<span style="background: #f0fdf4; color: #10b981; padding: 4px 10px; border-radius: 20px; font-size: 11px; margin-left: 8px;">结清</span>'}</span><span style="font-size: 18px; font-weight: 800; color: ${hasOwe ? '#ef4444' : '#10b981'};">¥${stats.total.toFixed(0)}</span></div><div style="display: flex; justify-content: space-between; font-size: 13px; color: #64748b;"><span>电话：${c.phone || '无'}</span><span>订单：${stats.orders}笔</span></div></div>`; }).join(''); }

        function calcCustomerStats(id) { const orders = salesOrders.filter(o => o.customerId === id); let total = 0, owe = 0; orders.forEach(o => { total += o.totalAmount; if (o.paymentStatus === 'unpaid') owe += o.totalAmount; else if (o.paymentStatus === 'partial') owe += o.remainingAmount; }); return { total, owe, orders: orders.length }; }

        function openSupplierModal() { currentEntityType = 'supplier'; document.getElementById('entityModalTitle').textContent = '添加供应商'; document.getElementById('entityName').value = ''; document.getElementById('entityPhone').value = ''; document.getElementById('entityRemark').value = ''; document.getElementById('entityModal').classList.add('show'); }
        function openCustomerModal() { currentEntityType = 'customer'; document.getElementById('entityModalTitle').textContent = '添加客户'; document.getElementById('entityName').value = ''; document.getElementById('entityPhone').value = ''; document.getElementById('entityRemark').value = ''; document.getElementById('entityModal').classList.add('show'); }
        function closeEntityModal() { document.getElementById('entityModal').classList.remove('show'); }
        function saveEntity() { const name = document.getElementById('entityName').value.trim(); if (!name) { alert('请输入名称'); return; } const entity = { id: Date.now(), name, phone: document.getElementById('entityPhone').value.trim(), remark: document.getElementById('entityRemark').value.trim() }; if (currentEntityType === 'supplier') { suppliers.push(entity); } else { customers.push(entity); } saveAllData(); closeEntityModal(); if (currentEntityType === 'supplier') { renderSuppliersList(); loadSupplierSelect(); } else { renderCustomersList(); } alert('✓ 已保存：' + name); }

        function filterSuppliers(type, btn) { supplierFilter = type; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderSuppliersList(); }
        function filterCustomers(type, btn) { customerFilter = type; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderCustomersList(); }
        function searchSuppliers(keyword) { renderSuppliersList(); }
        function searchCustomers(keyword) { renderCustomersList(); }

        function filterHistoryOrders() { const container = document.getElementById('historyOrdersList'); const orders = historyTab === 'purchase' ? purchaseOrders : salesOrders; const totalAmount = orders.reduce((s, o) => s + o.totalAmount, 0); document.getElementById('historyTotalAmount').textContent = '¥' + totalAmount.toFixed(2); document.getElementById('historyTotalOrders').textContent = orders.length; if (!orders.length) { container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">暂无订单</div>'; return; } container.innerHTML = orders.map(o => `<div class="order-card"><div style="display: flex; justify-content: space-between; margin-bottom: 14px;"><span style="font-weight: 700; color: #2563eb;">${o.docNumber || o.id}</span><span style="font-size: 13px; color: #64748b;">${o.date}</span></div><div style="font-size: 14px; color: #64748b; margin-bottom: 14px;">${o.product || '采购订单'}</div><div style="display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid #e2e8f0;"><span style="font-size: 18px; font-weight: 800;">¥${o.totalAmount.toFixed(2)}</span><span style="padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; background: ${o.paymentStatus === 'unpaid' ? '#fef3c7' : (o.paymentStatus === 'paid' ? '#d1fae5' : '#dbeafe')}; color: ${o.paymentStatus === 'unpaid' ? '#d97706' : (o.paymentStatus === 'paid' ? '#059669' : '#2563eb')};">${o.paymentStatus === 'unpaid' ? '未付款' : (o.paymentStatus === 'paid' ? '已付清' : '部分付款')}</span></div></div>`).join(''); }
        function switchHistoryTab(type, btn) { historyTab = type; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); filterHistoryOrders(); }
    </script>
